            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }

        }

        ];

        // ================= 组件 =================

        function App() {
            const [currentTab, setCurrentTab] = useState('home');
            const [studentName, setStudentName] = useState('');
            
            // 确保在组件挂载后重新初始化 Lucide 图标
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentTab]);

            const renderContent = () => {
                switch(currentTab) {
                    case 'home':
                        return <HomeView studentName={studentName} setStudentName={setStudentName} setTab={setCurrentTab} />;
                    case 'part1':
                        return <Part1View studentName={studentName} />;
                    case 'part2':
                        return <Part2View studentName={studentName} />;
                    case 'part3':
                        return <Part3View studentName={studentName} />;
                    default:
                        return <HomeView studentName={studentName} setStudentName={setStudentName} setTab={setCurrentTab} />;
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-800">
                    <nav className="w-full md:w-72 bg-indigo-700 text-white flex flex-col shadow-xl">
                        <div className="p-6">
                            <h1 className="text-2xl font-bold tracking-wider mb-2">汉语比赛系统</h1>
                            <p className="text-indigo-200 text-xs leading-relaxed">Xitoy tili musobaqasi tizimi<br/>Система соревнований по китайскому языку</p>
                        </div>
                        
                        <div className="flex-1 px-4 space-y-2 overflow-y-auto">
                            <NavItem icon="home" label="首页 (Bosh sahifa / Главная)" active={currentTab === 'home'} onClick={() => setCurrentTab('home')} />
                            <NavItem icon="mic" label="第一部分：演讲 (Nutq / Выступление)" active={currentTab === 'part1'} onClick={() => setCurrentTab('part1')} />
                            <NavItem icon="help-circle" label="第二部分：问答 (Savol-javob / Вопросы)" active={currentTab === 'part2'} onClick={() => setCurrentTab('part2')} />
                            <NavItem icon="book-a" label="第三部分：认读 (O'qish / Чтение)" active={currentTab === 'part3'} onClick={() => setCurrentTab('part3')} />
                        </div>
                        
                        {studentName && (
                            <div className="p-4 m-4 bg-indigo-800 rounded-lg flex items-center space-x-3">
                                <div className="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-xl">
                                    {studentName.charAt(0)}
                                </div>
                                <div className="overflow-hidden">
                                    <p className="text-[10px] text-indigo-300">当前考生 (Joriy ishtirokchi / Участник)</p>
                                    <p className="font-semibold truncate">{studentName}</p>
                                </div>
                            </div>
                        )}
                    </nav>

                    <main className="flex-1 p-4 md:p-8 overflow-y-auto">
                        <div className="max-w-5xl mx-auto">
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors text-left ${
                        active ? 'bg-white text-indigo-700 shadow-md font-bold' : 'hover:bg-indigo-600 text-indigo-50'
                    }`}
                >
                    <span className={active ? 'text-indigo-700' : 'text-indigo-300'}>
                        <Icon name={icon} size={20} />
                    </span>
                    <span className="text-sm">{label}</span>
                </button>
            );
        }

        function HomeView({ studentName, setStudentName, setTab }) {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 md:p-12 text-center animate-fade-in">
                    <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                        <Icon name="user" size={40} />
                    </div>
                    <h2 className="text-3xl font-bold mb-3">欢迎来到汉语比赛系统</h2>
                    <p className="text-slate-500 mb-2">Xitoy tili musobaqasi tizimiga xush kelibsiz</p>
                    <p className="text-slate-500 mb-10">Добро пожаловать в систему соревнований по китайскому языку</p>

                    <div className="max-w-lg mx-auto bg-slate-50 p-6 rounded-xl border border-slate-100">
                        <label className="block text-left text-sm font-semibold text-slate-700 mb-2">
                            请输入考生姓名 (Ishtirokchi ismini kiriting / Введите имя участника)
                        </label>
                        <input 
                            type="text" 
                            value={studentName}
                            onChange={(e) => setStudentName(e.target.value)}
                            placeholder="例如：张三 / Masalan: Ali / Например: Иван"
                            className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-lg mb-6"
                        />
                        
                        <div className="grid grid-cols-1 gap-3">
                            <button onClick={() => setTab('part1')} className="btn-primary flex items-center justify-center">
                                <Icon name="mic" size={18} className="mr-2" /> 开始 第一部分 (1-qismni boshlash / Начать часть 1)
                            </button>
                            <button onClick={() => setTab('part2')} className="btn-secondary flex items-center justify-center">
                                <Icon name="help-circle" size={18} className="mr-2" /> 开始 第二部分 (2-qismni boshlash / Начать часть 2)
                            </button>
                            <button onClick={() => setTab('part3')} className="btn-secondary flex items-center justify-center">
                                <Icon name="book-a" size={18} className="mr-2" /> 开始 第三部分 (3-qismni boshlash / Начать часть 3)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Part1View({ studentName }) {
            return (
                <div className="animate-fade-in">
                    <SectionHeader 
                        title="第一部分：命题演讲 (Mavzuli nutq / Выступление)" 
                        description="请考生从以下三个题目中选择一个进行演讲。 (Ishtirokchi quyidagi 3 ta mavzudan birini tanlashi kerak / Выберите одну из 3 тем)" 
                        studentName={studentName} 
                    />
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        {TOPICS.map((topic, index) => (
                            <div key={index} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center hover:shadow-md transition-shadow">
                                <div className="w-12 h-12 bg-indigo-100 text-indigo-700 font-bold rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                                    {index + 1}
                                </div>
                                <h3 className="text-2xl font-bold text-slate-800">{topic}</h3>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 flex flex-col items-center">
                        <h3 className="text-lg font-semibold text-slate-600 mb-4">演讲计时器 (Taymer / Таймер)</h3>
                        <Timer />
                    </div>
                </div>
            );
        }

        function Part2View({ studentName }) {
            const [drawnQuestions, setDrawnQuestions] = useState([]);
            const [isDrawing, setIsDrawing] = useState(false);
            const [selectedAnswers, setSelectedAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [drawnQuestions, isDrawing]);

            const drawRandomQuestions = () => {
                setIsDrawing(true);
                setDrawnQuestions([]);
                setSelectedAnswers({});
                setShowResults(false);
                
                setTimeout(() => {
                    const shuffled = [...QUESTION_BANK].sort(() => 0.5 - Math.random());
                    setDrawnQuestions(shuffled.slice(0, 6));
                    setIsDrawing(false);
                }, 600);
            };

            const handleSelect = (qIndex, optIndex) => {
                if (showResults) return;
                setSelectedAnswers(prev => ({...prev, [qIndex]: optIndex}));
            };

            return (
                <div className="animate-fade-in">
                    <SectionHeader 
                        title="第二部分：问答题 (Savol-javob / Вопросы и ответы)" 
                        description="系统总共有50道选择题，请点击下方按钮随机抽取6道题目。(50 ta savol mavjud, 6 ta savol tanlang / В системе 50 вопросов, выберите 6)" 
                        studentName={studentName} 
                    />

                    <div className="text-center mb-8">
                        <button 
                            onClick={drawRandomQuestions}
                            disabled={isDrawing}
                            className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all flex items-center mx-auto disabled:opacity-50"
                        >
                            <Icon name="refresh-cw" size={24} className={`mr-3 ${isDrawing ? 'animate-spin' : ''}`} />
                            {drawnQuestions.length > 0 ? "重新抽取6道题 (Qayta tanlash / Выбрать заново)" : "随机抽取6道题 (6 ta savol tanlash / Выбрать 6 вопросов)"}
                        </button>
                    </div>

                    {drawnQuestions.length > 0 && (
                        <div className="space-y-6">
                            {drawnQuestions.map((q, qIndex) => (
                                <div key={qIndex} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-indigo-50 border-b border-indigo-100 px-6 py-4 flex items-start">
                                        <span className="flex-shrink-0 w-8 h-8 bg-indigo-600 text-white font-bold rounded-full flex items-center justify-center mr-4 mt-0.5">
                                            {qIndex + 1}
                                        </span>
                                        <h3 className="text-xl font-bold text-slate-800 pt-1">{q.q}</h3>
                                    </div>
                                    <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {q.options.map((opt, optIndex) => {
                                            const isSelected = selectedAnswers[qIndex] === optIndex;
                                            const isCorrect = q.a === optIndex;
                                            let btnClass = "text-left px-6 py-4 rounded-xl border-2 transition-all font-medium ";
                                            
                                            if (showResults) {
                                                if (isCorrect) {
                                                    btnClass += "bg-emerald-50 border-emerald-500 text-emerald-800";
                                                } else if (isSelected && !isCorrect) {
                                                    btnClass += "bg-rose-50 border-rose-500 text-rose-800";
                                                } else {
                                                    btnClass += "bg-slate-50 border-slate-200 text-slate-500 opacity-50";
                                                }
                                            } else {
                                                if (isSelected) {
                                                    btnClass += "bg-indigo-50 border-indigo-500 text-indigo-800";
                                                } else {
                                                    btnClass += "bg-white border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-slate-50";
                                                }
                                            }

                                            return (
                                                <button 
                                                    key={optIndex}
                                                    onClick={() => handleSelect(qIndex, optIndex)}
                                                    disabled={showResults}
                                                    className={btnClass}
                                                >
                                                    {opt}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}

                            {!showResults && (
                                <div className="flex flex-col items-center mt-8 pb-8">
                                    <button
                                        onClick={() => setShowResults(true)}
                                        disabled={Object.keys(selectedAnswers).length < 6}
                                        className="bg-emerald-500 hover:bg-emerald-600 text-white px-10 py-4 rounded-xl font-bold text-lg shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        提交并查看结果 (Topshirish va ko'rish / Отправить и посмотреть)
                                    </button>
                                    {Object.keys(selectedAnswers).length < 6 && (
                                        <p className="text-sm text-slate-500 mt-3">请回答所有题目后提交 (Barcha savollarga javob bering / Ответьте на все вопросы)</p>
                                    )}
                                </div>
                            )}
                            
                            {showResults && (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center mt-8 mb-8">
                                    <h3 className="text-2xl font-bold text-slate-800 mb-4">测试结果 (Natijalar / Результаты)</h3>
                                    <p className="text-lg text-slate-600 flex items-center justify-center">
                                        本次得分 (Ball / Балл): <span className="font-bold text-indigo-600 text-4xl mx-3">
                                            {drawnQuestions.filter((q, i) => selectedAnswers[i] === q.a).length}
                                        </span> / 6
                                    </p>
                                </div>
                            )}
                        </div>
                    )}
                    
                    {!isDrawing && drawnQuestions.length === 0 && (
                        <div className="bg-slate-100 border border-slate-200 border-dashed rounded-2xl p-12 text-center text-slate-400">
                            点击上方按钮开始抽题 (Boshlash uchun yuqoridagi tugmani bosing / Нажмите кнопку выше для начала)
                        </div>
                    )}
                </div>
            );
        }

        function Part3View({ studentName }) {
            const [selectedWords, setSelectedWords] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [showPinyin, setShowPinyin] = useState(false);
            
            const NUM_WORDS_TO_READ = 15; 

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [selectedWords, showPinyin]);

            const generateWords = () => {
                const shuffled = [...HSK_WORDS].sort(() => 0.5 - Math.random());
                setSelectedWords(shuffled.slice(0, NUM_WORDS_TO_READ));
                setCurrentIndex(0);
                setShowPinyin(false);
            };

            const nextWord = () => {
                if (currentIndex < selectedWords.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setShowPinyin(false);
                }
            };

            const prevWord = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(prev => prev - 1);
                    setShowPinyin(false);
                }
            };

            return (
                <div className="animate-fade-in">
                    <SectionHeader 
                        title="第三部分：汉字认读 (Iyerogliflarni o'qish / Чтение иероглифов)" 
                        description="包含HSK1和HSK2词汇。(HSK1 va HSK2 so'zlarini o'z ichiga oladi / Включает лексику HSK1 и HSK2)" 
                        studentName={studentName} 
                    />

                    <div className="flex justify-between items-center mb-6">
                        <button 
                            onClick={generateWords}
                            className="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-6 py-3 rounded-xl font-semibold transition-colors flex items-center"
                        >
                            <Icon name="refresh-cw" size={18} className="mr-2" /> 生成新词组 ({NUM_WORDS_TO_READ} ta so'z / {NUM_WORDS_TO_READ} слов)
                        </button>

                        {selectedWords.length > 0 && (
                            <div className="text-slate-500 font-medium">
                                进度 (Jarayon / Прогресс): <span className="text-indigo-600 font-bold text-lg">{currentIndex + 1}</span> / {selectedWords.length}
                            </div>
                        )}
                    </div>

                    {selectedWords.length > 0 ? (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 flex flex-col items-center min-h-[400px] justify-center relative">
                            
                            <button 
                                onClick={() => setShowPinyin(!showPinyin)}
                                className="absolute top-6 right-6 text-slate-400 hover:text-indigo-600 flex items-center space-x-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200"
                                title="显示/隐藏拼音 (Pinyin ko'rsatish-yashirish / Показать-скрыть пиньинь)"
                            >
                                <Icon name={showPinyin ? "eye-off" : "eye"} size={18} />
                                <span className="text-sm font-medium">{showPinyin ? "隐藏拼音 (Yashirish / Скрыть)" : "显示拼音 (Ko'rsatish / Показать)"}</span>
                            </button>

                            <div className="text-center w-full max-w-lg mb-12">
                                <div className={`h-12 mb-4 transition-opacity duration-300 ${showPinyin ? 'opacity-100' : 'opacity-0'}`}>
                                    <p className="text-3xl text-slate-500 font-sans tracking-widest">
                                        {selectedWords[currentIndex].pinyin}
                                    </p>
                                </div>
                                <h1 className="text-9xl font-bold text-slate-900 tracking-wider">
                                    {selectedWords[currentIndex].word}
                                </h1>
                            </div>

                            <div className="flex items-center space-x-6 w-full justify-center">
                                <button 
                                    onClick={prevWord}
                                    disabled={currentIndex === 0}
                                    className="p-4 rounded-full bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-700 disabled:opacity-30 disabled:hover:bg-slate-100 transition-colors"
                                >
                                    <Icon name="chevron-left" size={32} />
                                </button>
                                <button 
                                    onClick={nextWord}
                                    disabled={currentIndex === selectedWords.length - 1}
                                    className="p-4 rounded-full bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-700 disabled:opacity-30 disabled:hover:bg-slate-100 transition-colors"
                                >
                                    <Icon name="chevron-right" size={32} />
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-slate-100 border border-slate-200 border-dashed rounded-2xl p-16 text-center text-slate-400">
                            点击上方按钮开始测试 (Boshlash uchun yuqoridagi tugmani bosing / Нажмите кнопку выше для начала)
                        </div>
                    )}
                </div>
            );
        }

        function SectionHeader({ title, description, studentName }) {
            return (
                <div className="mb-8 border-b border-slate-200 pb-6">
                    <div className="flex justify-between items-end">
                        <div>
                            <h2 className="text-3xl font-bold text-slate-800 mb-2">{title}</h2>
                            <p className="text-slate-500">{description}</p>
                        </div>
                        {studentName && (
                            <div className="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg font-semibold border border-indigo-100 text-sm">
                                当前考生 (Ishtirokchi / Участник)：<br/><span className="text-lg">{studentName}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Timer() {
            const INITIAL_TIME = 60; 
            const [time, setTime] = useState(INITIAL_TIME);
            const [isRunning, setIsRunning] = useState(false);
            const intervalRef = useRef(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isRunning]);

            useEffect(() => {
                if (isRunning && time > 0) {
                    intervalRef.current = setInterval(() => {
                        setTime((prevTime) => {
                            if (prevTime <= 1) {
                                clearInterval(intervalRef.current);
                                setIsRunning(false);
                                return 0;
                            }
                            return prevTime - 1;
                        });
                    }, 1000);
                } else {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [isRunning, time]);

            const toggleTimer = () => {
                if (time > 0) {
                    setIsRunning(!isRunning);
                }
            };
            
            const resetTimer = () => {
                setIsRunning(false);
                setTime(INITIAL_TIME);
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const timeColorClass = time === 0 
                ? "text-rose-600 bg-rose-50 border-rose-200" 
                : time <= 10 
                    ? "text-amber-500 bg-amber-50 border-amber-200" 
                    : "text-slate-800 bg-slate-50 border-slate-200";

            return (
                <div className="flex flex-col items-center">
                    <div className={`text-7xl font-mono font-bold mb-8 tracking-wider px-8 py-4 rounded-2xl border transition-colors duration-300 ${timeColorClass}`}>
                        {formatTime(time)}
                    </div>
                    <div className="flex space-x-4">
                        <button 
                            onClick={toggleTimer} 
                            disabled={time === 0}
                            className={`flex items-center px-6 py-3 rounded-xl font-bold text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed ${
                                isRunning ? 'bg-amber-500 hover:bg-amber-600' : 'bg-emerald-500 hover:bg-emerald-600'
                            }`}
                        >
                            {isRunning 
                                ? <><Icon name="square" size={20} className="mr-2"/> 暂停 (To'xtatish / Пауза)</> 
                                : <><Icon name="play" size={20} className="mr-2"/> 开始 (Boshlash / Старт)</>
                            }
                        </button>
                        <button 
                            onClick={resetTimer} 
                            className="flex items-center px-6 py-3 rounded-xl font-bold bg-slate-200 text-slate-700 hover:bg-slate-300 transition-all"
                        >
                            <Icon name="rotate-ccw" size={20} className="mr-2"/> 重置 (Qayta o'rnatish / Сброс)
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
