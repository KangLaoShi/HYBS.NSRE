        // ================= 组件 (Components) =================

        // 引入空安全检查的 Icon
        function Icon({ name, size = 24, className = '' }) {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (spanRef.current && window.lucide && window.lucide.createIcons) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: spanRef.current });
                }
            }, [name, size, className]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size }}></span>;
        }

            const [currentLevel, setCurrentLevel] = useState('hsk1');

                switch(currentTab) {

                    case 'part1':
                        return <Part1View studentName={studentName} currentLevel={currentLevel} />;
                    case 'part2':
                        return <Part2View studentName={studentName} currentLevel={currentLevel} />;
                    case 'part3':
                        return <Part3View studentName={studentName} currentLevel={currentLevel} />;
                    default:
                        return <HomeView studentName={studentName} setStudentName={setStudentName} setTab={setCurrentTab} currentLevel={currentLevel} setCurrentLevel={setCurrentLevel} />;
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-800">
                    {/* 侧边导航栏 */}
                    <nav className="w-full md:w-72 bg-cyan-600 text-white flex flex-col shadow-xl z-10">
                        <div className="p-6">
                            <h1 className="text-2xl font-bold tracking-wider mb-2">汉语比赛系统</h1>
                            <p className="text-cyan-100 text-xs leading-relaxed">Xitoy tili musobaqasi tizimi<br/>Система соревнований по китайскому языку</p>
                            <div className="mt-4 bg-cyan-700/60 px-3 py-1.5 rounded-lg text-center text-sm font-bold border border-cyan-500/30">
                                Daraja / Уровень: <span className="text-white text-base">{COMPETITION_DATA[currentLevel].level}</span>
                            </div>
                        </div>
                        
                        <div className="flex-1 px-4 space-y-2 mt-4">
                            <NavItem icon="home" label="Asosiy (Главная)" active={currentTab === 'home'} onClick={() => setCurrentTab('home')} />
                            <NavItem icon="mic" label="1-qism: Nutq (Часть 1: Речь)" active={currentTab === 'part1'} onClick={() => setCurrentTab('part1')} />
                            <NavItem icon="help-circle" label="2-qism: Savollar (Часть 2: Вопросы)" active={currentTab === 'part2'} onClick={() => setCurrentTab('part2')} />
                            <NavItem icon="book-a" label="3-qism: O'qish (Часть 3: Чтение)" active={currentTab === 'part3'} onClick={() => setCurrentTab('part3')} />
                        </div>
                        
                        {studentName && (
                            <div className="p-4 m-4 bg-cyan-700 rounded-lg flex items-center space-x-3">
                                <div className="w-10 h-10 bg-cyan-100 rounded-full flex items-center justify-center font-bold text-xl uppercase text-cyan-800">
                                    {studentName.charAt(0)}
                                </div>
                                <div className="overflow-hidden">
                                    <p className="text-xs text-cyan-200">Ishtirokchi / Участник</p>
                                    <p className="font-semibold truncate text-white">{studentName}</p>
                                </div>
                            </div>

                        <div className="max-w-5xl mx-auto">
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors text-left ${
                        active ? 'bg-white text-cyan-700 shadow-md font-bold' : 'hover:bg-cyan-500 text-cyan-50'
                    }`}
                >
                    <span className={active ? 'text-cyan-600' : 'text-cyan-200'}>
                        <Icon name={icon} size={20} />
                    </span>
                    <span className="text-sm">{label}</span>
                </button>
            );
        }

                                type="text" 
                                value={studentName}
                                onChange={(e) => setStudentName(e.target.value)}
                                placeholder="Masalan: Aziza / Например: Азиза"
                                className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all text-lg"
                            />
                        </div>
                        
                        <div className="grid grid-cols-1 gap-3">
                            <button onClick={() => setTab('part1')} className="btn-primary flex items-center justify-center">
                                <Icon name="mic" size={18} className="mr-2" /> Boshlash 1-qism (Начать Часть 1)
                            </button>
                            <button onClick={() => setTab('part2')} className="btn-secondary flex items-center justify-center">
                                <Icon name="help-circle" size={18} className="mr-2" /> Boshlash 2-qism (Начать Часть 2)
                            </button>
                            <button onClick={() => setTab('part3')} className="btn-secondary flex items-center justify-center">
                                <Icon name="book-a" size={18} className="mr-2" /> Boshlash 3-qism (Начать Часть 3)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function SectionHeader({ title, description, studentName }) {
            return (
                <div className="mb-8 border-b border-slate-200 pb-6">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
                        <div>
                            <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-2">{title}</h2>
                            <p className="text-slate-500 text-sm md:text-base">{description}</p>
                        </div>
                        {studentName && (
                            <div className="bg-cyan-50 text-cyan-700 px-4 py-2 rounded-lg font-semibold border border-cyan-100 whitespace-nowrap">
                                Ishtirokchi / Участник: <span className="text-lg">{studentName}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Part1View({ studentName, currentLevel }) {
            const currentTopics = COMPETITION_DATA[currentLevel].topics;

            return (
                <div className="animate-fade-in">
                    <SectionHeader 
                        title={`第一部分：命题演讲 (${COMPETITION_DATA[currentLevel].level})`} 
                        description="Ishtirokchi quyidagi mavzudan birini tanlashi kerak / Выберите одну тему" 
                        studentName={studentName} 
                    />
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        {currentTopics.map((topic, index) => (
                            <div key={index} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center hover:shadow-md transition-shadow">
                                <div className="w-12 h-12 bg-cyan-100 text-cyan-700 font-bold rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                                    {index + 1}
                                </div>
                                <h3 className="text-xl md:text-2xl font-bold text-slate-800 whitespace-pre-wrap">{topic}</h3>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 flex flex-col items-center">
                        <h3 className="text-lg font-semibold text-slate-600 mb-4">Vaqt (Таймер) - 1 Daqiqa / 1 Минута</h3>
                        <Timer />
                    </div>
                </div>
            );
        }

        function Timer() {
            const [time, setTime] = useState(60); 
            const [isRunning, setIsRunning] = useState(false);
            const intervalRef = useRef(null);

            useEffect(() => {
                if (isRunning && time > 0) {
                    intervalRef.current = setInterval(() => setTime((prevTime) => prevTime - 1), 1000);
                } else if (time === 0) {
                    setIsRunning(false);
                    clearInterval(intervalRef.current);
                } else {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [isRunning, time]);

            const toggleTimer = () => setIsRunning(!isRunning);
            const resetTimer = () => { setIsRunning(false); setTime(60); };
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            let textColorClass = "text-slate-800";
            if (time === 0) textColorClass = "text-rose-600";
            else if (time <= 10) textColorClass = "text-amber-500";

            return (
                <div className="flex flex-col items-center">
                    <div className={`text-7xl font-mono font-bold mb-8 tracking-wider bg-slate-50 px-8 py-4 rounded-2xl border border-slate-200 transition-colors duration-300 ${textColorClass}`}>
                        {formatTime(time)}
                    </div>
                    <div className="flex space-x-4">
                        <button 
                            onClick={toggleTimer} 
                            disabled={time === 0}
                            className={`flex items-center px-6 py-3 rounded-xl font-bold text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed ${
                                isRunning ? 'bg-amber-500 hover:bg-amber-600' : 'bg-cyan-500 hover:bg-cyan-600'
                            }`}
                        >
                            {isRunning ? <><Icon name="square" size={20} className="mr-2"/> To'xtatish (Пауза)</> : <><Icon name="play" size={20} className="mr-2"/> Boshlash (Старт)</>}
                        </button>
                        <button 
                            onClick={resetTimer} 
                            className="flex items-center px-6 py-3 rounded-xl font-bold bg-slate-200 text-slate-700 hover:bg-slate-300 transition-all"
                        >
                            <Icon name="rotate-ccw" size={20} className="mr-2"/> Qayta o'rnatish (Сброс)
                        </button>
                    </div>
                </div>
            );
        }

        function Part2View({ studentName, currentLevel }) {
            const [drawnQuestions, setDrawnQuestions] = useState([]);
            const [isDrawing, setIsDrawing] = useState(false);
            const [selectedAnswers, setSelectedAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);

            const currentQuestionBank = COMPETITION_DATA[currentLevel].questions;

            const drawRandomQuestions = () => {
                setIsDrawing(true);
                setDrawnQuestions([]);
                setSelectedAnswers({});
                setShowResults(false);
                setTimeout(() => {
                    const shuffled = [...currentQuestionBank].sort(() => 0.5 - Math.random());
                    setDrawnQuestions(shuffled.slice(0, Math.min(6, currentQuestionBank.length)));
                    setIsDrawing(false);
                }, 600);
            };

            const handleSelect = (qIndex, optIndex) => {
                if (showResults) return;
                setSelectedAnswers(prev => ({...prev, [qIndex]: optIndex}));
            };

            return (
                <div className="animate-fade-in">
                    <SectionHeader 
                        title={`第二部分：问答题 (${COMPETITION_DATA[currentLevel].level})`} 
                        description="Savol tanlash uchun tugmani bosing / Нажмите кнопку, чтобы выбрать вопросы" 
                        studentName={studentName} 
                    />

                    <div className="text-center mb-8">
                        <button 
                            onClick={drawRandomQuestions}
                            disabled={isDrawing}
                            className="bg-cyan-500 hover:bg-cyan-600 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all flex items-center mx-auto disabled:opacity-50"
                        >
                            <Icon name="refresh-cw" size={24} className={`mr-3 ${isDrawing ? 'animate-spin' : ''}`} />
                            {drawnQuestions.length > 0 ? "Qayta tanlash (Выбрать снова)" : "Tasodifiy tanlash (Случайный выбор)"}
                        </button>
                    </div>

                    {drawnQuestions.length > 0 && (
                        <div className="space-y-6">
                            {drawnQuestions.map((q, qIndex) => (
                                <div key={qIndex} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-cyan-50 border-b border-cyan-100 px-6 py-4 flex items-start">
                                        <span className="flex-shrink-0 w-8 h-8 bg-cyan-600 text-white font-bold rounded-full flex items-center justify-center mr-4 mt-1">
                                            {qIndex + 1}
                                        </span>
                                        <div>
                                            <h3 className="text-xl font-bold text-slate-800">{q.q}</h3>
                                            {q.pinyin && <p className="text-cyan-600 font-sans mt-1">{q.pinyin}</p>}
                                        </div>
                                    </div>
                                    <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {q.options.map((opt, optIndex) => {
                                            const isSelected = selectedAnswers[qIndex] === optIndex;
                                            const isCorrect = q.a === optIndex;
                                            let btnClass = "text-left px-6 py-4 rounded-xl border-2 transition-all font-medium ";
                                            
                                            if (showResults) {
                                                if (isCorrect) {
                                                    btnClass += "bg-green-100 border-green-500 text-green-800 shadow-sm";
                                                } else if (isSelected && !isCorrect) {
                                                    btnClass += "bg-rose-50 border-rose-500 text-rose-800";
                                                } else {
                                                    btnClass += "bg-slate-50 border-slate-200 text-slate-500 opacity-50";
                                                }
                                            } else {
                                                if (isSelected) {
                                                    btnClass += "bg-cyan-50 border-cyan-500 text-cyan-800";
                                                } else {
                                                    btnClass += "bg-white border-slate-200 text-slate-700 hover:border-cyan-300 hover:bg-slate-50";
                                                }
                                            }

                                            return (
                                                <button 
                                                    key={optIndex}
                                                    onClick={() => handleSelect(qIndex, optIndex)}
                                                    disabled={showResults}
                                                    className={btnClass}
                                                >
                                                    {opt}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}

                            {!showResults && (
                                <div className="flex flex-col items-center mt-8 pb-8">
                                    <button
                                        onClick={() => setShowResults(true)}
                                        disabled={Object.keys(selectedAnswers).length < drawnQuestions.length}
                                        className="bg-cyan-600 hover:bg-cyan-700 text-white px-10 py-4 rounded-xl font-bold text-lg shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        Natijani ko'rish (Отправить и проверить)
                                    </button>
                                </div>
                            )}
                            
                            {showResults && (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center mt-8 mb-8 animate-fade-in">
                                    <h3 className="text-2xl font-bold text-slate-800 mb-4">Natija (Результат)</h3>
                                    <p className="text-lg text-slate-600 flex items-center justify-center">
                                        Ball (Баллы): <span className="font-bold text-cyan-600 text-4xl mx-3">
                                            {drawnQuestions.filter((q, i) => selectedAnswers[i] === q.a).length}
                                        </span> / {drawnQuestions.length}
                                    </p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function Part3View({ studentName, currentLevel }) {
            const [selectedWords, setSelectedWords] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [showPinyin, setShowPinyin] = useState(false);
            
            const NUM_WORDS_TO_READ = 6; 
            const currentWordsBank = COMPETITION_DATA[currentLevel].words;

            const generateWords = () => {
                const shuffled = [...currentWordsBank].sort(() => 0.5 - Math.random());
                setSelectedWords(shuffled.slice(0, Math.min(NUM_WORDS_TO_READ, currentWordsBank.length)));
                setCurrentIndex(0);
                setShowPinyin(false);
            };

            const nextWord = () => {
                if (currentIndex < selectedWords.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setShowPinyin(false);
                }
            };

            const prevWord = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(prev => prev - 1);
                    setShowPinyin(false);
                }
            };

            return (
                <div className="animate-fade-in">
                    <SectionHeader 
                        title={`第三部分：汉字认读 (${COMPETITION_DATA[currentLevel].level})`} 
                        description="So'zlarni o'qish / Чтение иероглифов" 
                        studentName={studentName} 
                    />

                    <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                        <button 
                            onClick={generateWords}
                            className="bg-cyan-100 text-cyan-800 hover:bg-cyan-200 px-6 py-3 rounded-xl font-semibold transition-colors flex items-center w-full sm:w-auto justify-center"
                        >
                            <Icon name="refresh-cw" size={18} className="mr-2" /> Yangi so'zlar (Новые слова)
                        </button>

                        {selectedWords.length > 0 && (
                            <div className="text-slate-500 font-medium">
                                <span className="text-cyan-600 font-bold text-lg">{currentIndex + 1}</span> / {selectedWords.length}
                            </div>
                        )}
                    </div>

                    {selectedWords.length > 0 ? (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 flex flex-col items-center min-h-[400px] justify-center relative">
                            
                            {/* 拼音开关 */}
                            <button 
                                onClick={() => setShowPinyin(!showPinyin)}
                                className="absolute top-6 right-6 text-slate-400 hover:text-cyan-600 flex items-center space-x-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200"
                                title="Pinyin ko'rsatish/yashirish (Показать/Скрыть пиньинь)"
                            >
                                <Icon name={showPinyin ? "eye-off" : "eye"} size={18} />
                                <span className="text-sm font-medium hidden sm:inline">{showPinyin ? "Yashirish (Скрыть)" : "Ko'rsatish (Показать)"}</span>
                            </button>

                            {/* 闪卡内容 */}
                            <div className="text-center w-full max-w-lg mb-12 mt-8">
                                <div className={`h-12 mb-4 transition-opacity duration-300 ${showPinyin ? 'opacity-100' : 'opacity-0'}`}>
                                    <p className="text-3xl md:text-4xl text-slate-500 font-sans tracking-widest">
                                        {selectedWords[currentIndex].pinyin}
                                    </p>
                                </div>
                                <h1 className="text-8xl md:text-9xl font-bold text-slate-900 tracking-wider" style={{ wordBreak: 'break-word' }}>
                                    {selectedWords[currentIndex].word}
                                </h1>
                            </div>

                            {/* 导航按钮 */}
                            <div className="flex items-center space-x-6 w-full justify-center">
                                <button 
                                    onClick={prevWord}
                                    disabled={currentIndex === 0}
                                    className="p-4 rounded-full bg-slate-100 text-slate-600 hover:bg-cyan-100 hover:text-cyan-700 disabled:opacity-30 disabled:hover:bg-slate-100 transition-colors"
                                >
                                    <Icon name="chevron-left" size={32} />
                                </button>
                                <button 
                                    onClick={nextWord}
                                    disabled={currentIndex === selectedWords.length - 1}
                                    className="p-4 rounded-full bg-slate-100 text-slate-600 hover:bg-cyan-100 hover:text-cyan-700 disabled:opacity-30 disabled:hover:bg-slate-100 transition-colors"
                                >
                                    <Icon name="chevron-right" size={32} />
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-slate-100 border border-slate-200 border-dashed rounded-2xl p-16 text-center text-slate-400">
                            Boshlash uchun yuqoridagi tugmani bosing<br/>
                            Нажмите кнопку выше, чтобы начать
                        </div>
                    )}
                </div>
            );
        }

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
